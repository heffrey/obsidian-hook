name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  roundtrip:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: install -> uninstall round-trip
        run: bash test/roundtrip.sh
